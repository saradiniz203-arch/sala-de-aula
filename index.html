<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Quicklist</title>
</head>
<body>
    <header>
        <img src="./quicklist-imagens/logo.png" alt="Logo do Quiclist">
    </header>

    <main>
        <section class="adicionar-item">
            <h1>Compras da semana</h1>

            <div>
                <input type="text" id="item" placeholder="Adicionar um novo item">
                <button>Adicionar item</button>
            </div>
        </section>
        
        <section class="lista">
            <div class="item">
                <div>
                    <input type="checkbox" id="item">
                    <label for="item-1">Pão de forma</label>
                </div>

                <button>
                    <img src="./quicklist-imagens/trash-icon.svg" alt="Imagem do lixo">
                </button>
            </div>
        </section>

      
            <div class="item">
                <div>
                    <input type="checkbox" id="item-2">
                    <label for="item-2">Café preto</label>
                </div>

                <button>
                    <img src="./quicklist-imagens/trash-icon.svg" alt="Imagem do lixo">
                </button>
            </div>
        
            <div class="item">
                <div>
                    <input type="checkbox" id="item-3">
                    <label for="item-3">Suco de laranja</label>
                </div>

                <button>
                    <img src="./quicklist-imagens/trash-icon.svg" alt="Imagem do lixo">
                </button>
            </div>
        </section>
    </main>
</body>
</html>
